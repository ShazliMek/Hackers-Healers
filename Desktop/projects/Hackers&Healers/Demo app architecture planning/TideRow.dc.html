<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div onClick="{{ t.onOpen }}" style="display: grid; grid-template-columns: 36px minmax(140px,1.6fr) minmax(118px,1.15fr) minmax(160px,2.1fr) 112px 86px 100px 122px 24px; align-items: center; gap: 12px; padding: 11px 18px; border-bottom: 1px solid #f1f4f6; cursor: pointer; background: {{ t.rowBg }};" style-hover="background:#f7fbfb">
  <div onClick="{{ t.onToggle }}" style="{{ t.checkStyle }}">{{ t.checkMark }}</div>

  <div style="min-width: 0;">
    <div style="font-size: 13.5px; font-weight: 600; color: #2b3742; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">{{ t.name }}</div>
    <div style="font-size: 11px; color: #9aa7b2; font-family: 'IBM Plex Mono', monospace;">{{ t.meta }}</div>
  </div>

  <div style="display: flex; align-items: center; gap: 8px; min-width: 0;">
    <div style="{{ t.dotStyle }}"></div>
    <span style="font-size: 12.5px; color: #3a4651; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">{{ t.cohortShort }}</span>
  </div>

  <div style="font-size: 12.5px; color: #6b7884; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0;">{{ t.why }}</div>

  <div style="min-width: 0;">
    <div style="font-size: 13px; font-weight: 600; color: #2b3742; font-family: 'IBM Plex Mono', monospace;">{{ t.due }}</div>
    <div style="{{ t.dueTagStyle }}">{{ t.dueTag }}</div>
  </div>

  <div><span style="{{ t.channelStyle }}"><span>{{ t.channelGlyph }}</span>{{ t.channel }}</span></div>

  <div style="display: flex; align-items: center; gap: 8px;">
    <div style="flex: 1; height: 5px; background: #eef2f5; border-radius: 3px; overflow: hidden;"><div style="{{ t.confBarStyle }}"></div></div>
    <span style="{{ t.confStyle }}">{{ t.confLabel }}</span>
  </div>

  <div><span style="{{ t.statusStyle }}"><span style="{{ t.statusDotStyle }}"></span>{{ t.statusLabel }}</span></div>

  <div style="text-align: center; color: #c3ccd4; font-size: 17px;">›</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1100,&quot;height&quot;:54},&quot;t&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any&quot;}}"></script>
</body>
</html>
